<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustChain | Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Create Account</h2>
      <p>Enter your details to receive a secure link.</p>
      <form id="signupForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Password" minlength="6" required />
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
        <button type="submit">Send Verification Link</button>
      </form>
      <p class="switch">Already a member? <a href="index.html">Login</a></p>
    </div>
  </div>


 <script type="module">
  import { startSignup } from "./auth.js";

  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const u = document.getElementById("username").value;
    const em = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    const cp = document.getElementById("confirmPassword").value;

    if (p !== cp) return alert("Passwords do not match!");
    
    const btn = e.target.querySelector("button");
    btn.innerText = "Sending Link...";
    btn.disabled = true;

    await startSignup(em, u, p);
    
    btn.innerText = "Send Verification Link";
    btn.disabled = false;
  });
</script>
</body>
</html>
