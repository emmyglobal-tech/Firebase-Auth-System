<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustChain | Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- <div class="container">
    <div class="card">
      <h2 id="statusTitle">Accessing Secure Vault...</h2>
      <p id="userDisplay">Authenticating session...</p>
      
      <div id="actionArea">
        <button id="logoutBtn" style="display:none;">Secure Logout</button>
      </div>
    </div>
  </div> -->

  <div class="card dashboard-card">
  <div class="user-header">
    <h2 id="statusTitle">Accessing Vault...</h2>
    <p id="userDisplay">Authenticating...</p>
  </div>

  <div class="balance-container">
    <span class="label">Total Balance</span>
    <h1 class="amount">$0.00</h1>
    <div class="balance-details">
      <span>**** **** **** 4290</span>
      <span class="chip-icon">VISA</span>
    </div>
  </div>

  <div class="actions-grid">
    <button class="action-btn">Send</button>
    <button class="action-btn">Receive</button>
    <button class="action-btn">Swap</button>
  </div>

  <div class="transaction-section">
    <h3>Recent Activity</h3>
    <div class="transaction-item">
      <div class="tx-info">
        <span class="tx-name">Cloud Server Subscription</span>
        <span class="tx-date">April 24, 2026</span>
      </div>
      <span class="tx-amount negative">-$15.00</span>
    </div>
    <div class="transaction-item">
      <div class="tx-info">
        <span class="tx-name">Project Deposit</span>
        <span class="tx-date">April 22, 2026</span>
      </div>
      <span class="tx-amount positive">+$1,250.00</span>
    </div>
  </div>

  <button id="logoutBtn" style="display:none;" class="btn-secondary">Secure Logout</button>
</div>



  <script type="module">
  import { auth } from "./firebase.js";
  import { onAuthStateChanged, reload } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { logoutUser } from "./auth.js";

  const adminEmail = "emmanuelglobal101@gmail.com";

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await reload(user); // Check if they just clicked the verify link

      if (user.email === adminEmail) {
        window.location.href = "admin.html";
        return;
      }

      if (user.emailVerified) {
        document.getElementById('statusTitle').textContent = `Welcome, ${user.displayName || 'Client'}`;
        document.getElementById('userDisplay').textContent = user.email;
        document.getElementById('logoutBtn').style.display = "block";
      } else {
        // If not verified, they shouldn't be here
        window.location.href = "index.html";
      }
    } else {
      window.location.href = "index.html";
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', logoutUser);
</script>
</body>
</html>
