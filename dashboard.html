<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustChain | Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 id="statusTitle">Accessing Secure Vault...</h2>
      <p id="userDisplay">Authenticating session...</p>
      
      <div id="actionArea">
        <button id="logoutBtn" style="display:none;">Secure Logout</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from "./firebase.js";
    import { onAuthStateChanged, reload } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { logoutUser } from "./auth.js";

    const statusTitle = document.getElementById('statusTitle');
    const userDisplay = document.getElementById('userDisplay');
    const logoutBtn = document.getElementById('logoutBtn');

    // Monitor Authentication State
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // 1. Force refresh the user token to check if they just verified their email
        try {
          await reload(user);
        } catch (error) {
          console.error("Reload failed:", error);
        }

        // 2. Check Verification Status
        if (user.emailVerified) {
          statusTitle.textContent = `Welcome, ${user.displayName || 'User'}`;
          statusTitle.style.color = "#3b82f6"; // TrustChain Blue
          userDisplay.textContent = user.email;
          logoutBtn.style.display = "block";
        } else {
          statusTitle.textContent = "Verify Your Identity";
          statusTitle.style.color = "#ef4444"; // Security Red
          userDisplay.textContent = "Check your inbox for the TrustChain verification link.";
          logoutBtn.style.display = "block"; // Allow logout to try another email
        }
      } else {
        // 3. No user detected? Go back to login.
        window.location.href = "login.html";
      }
    });

    // 4. Handle Logout Button Click
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        await logoutUser();
      });
    }
  </script>
</body>
</html>
