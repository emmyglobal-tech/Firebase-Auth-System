<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustChain | Admin Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin-style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="logo">TrustChain<span>Admin</span></div>
      <ul>
        <li class="active">Overview</li>
        <li>Users</li>
        <li>Transactions</li>
        <li>Security</li>
      </ul>
      <button id="adminLogoutBtn" class="btn-logout">Logout</button>
    </nav>

    <main class="content">
      <header>
        <h1>System Overview</h1>
        <div class="admin-profile">Admin: Emmanuel Chukwuma</div>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Users</h3>
          <p id="totalUsersCount">0</p>
        </div>
        <div class="stat-card">
          <h3>Active Sessions</h3>
          <p id="activeSessions">--</p>
        </div>
        <div class="stat-card">
          <h3>Total Volume</h3>
          <p>$0.00</p>
        </div>
      </div>

      <section class="user-section">
        <h2>User Management</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <tr><td colspan="4">Loading system data...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { logoutUser } from "./auth.js";

    const adminEmail = "emmanuelglobal101@gmail.com";
    const userTableBody = document.getElementById('userTableBody');
    const totalUsersCount = document.getElementById('totalUsersCount');

    // 1. SECURITY & REDIRECT
    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== adminEmail) {
        alert("Restricted Access: Admin Credentials Required.");
        window.location.href = "login.html";
      } else {
        // Logged in as Emmanuel - Start listening for data
        startRealtimeUpdates();
      }
    });

    // 2. FETCH DATA IN REAL-TIME
    function startRealtimeUpdates() {
      // "onSnapshot" updates the table automatically without refreshing
      onSnapshot(collection(db, "users"), (snapshot) => {
        userTableBody.innerHTML = ""; // Clear the table
        totalUsersCount.textContent = snapshot.size; // Update total count

        if (snapshot.empty) {
          userTableBody.innerHTML = "<tr><td colspan='4'>No users found in database.</td></tr>";
          return;
        }

        snapshot.forEach((doc) => {
          const data = doc.data();
          const row = `
            <tr>
              <td>${data.username || "Anonymous"}</td>
              <td>${data.email}</td>
              <td><span class="status-badge ${data.status || 'pending'}">${data.status || 'Verified'}</span></td>
              <td>
                <button class="manage-btn" onclick="console.log('Managing: ${doc.id}')">View</button>
              </td>
            </tr>
          `;
          userTableBody.innerHTML += row;
        });
      }, (error) => {
        console.error("Firestore Error:", error);
        userTableBody.innerHTML = "<tr><td colspan='4'>Error: Ensure Firestore rules allow Admin read.</td></tr>";
      });
    }

    // 3. LOGOUT
    document.getElementById('adminLogoutBtn').addEventListener('click', logoutUser);
  </script>
</body>
</html>
